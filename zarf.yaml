# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: snapback
  description: "Kubernetes operator that replicates Velero backups between clusters using Peat"
  version: "dev"
  annotations:
    dev.uds.title: Snapback
    dev.uds.tagline: "Replicate Velero backups across clusters using the peat protocol"
    dev.uds.categories: "Storage, Backup & Recovery, Operators"
    dev.uds.keywords: "velero, backup, restore, replication, disaster-recovery, operator"
    dev.uds.icon: "data:image/svg+xml;base64,"

variables:
  - name: DOMAIN
    default: "uds.dev"
  # ROLE selects which side this deployment is. Drives both the config chart
  # (network policy) and the app chart (workloads). source | destination.
  - name: ROLE
    default: "source"

components:
  - name: snapback
    required: true
    only:
      flavor: upstream
    charts:
      # Config chart (UDS Package CR: netpol + monitoring) deploys first.
      - name: uds-snapback-config
        namespace: snapback
        version: 0.1.0
        localPath: charts/uds-snapback-config/
        valuesFiles:
          - values/common-uds-values.yaml
      # App chart (CRDs, RBAC, the role-appropriate workloads).
      - name: snapback
        namespace: snapback
        version: 0.1.0
        localPath: charts/snapback/
        valuesFiles:
          - values/common-values.yaml
    actions:
      onCreate:
        before:
          - description: Ensure buildx builder exists
            cmd: |
              docker buildx create --use \
                --name uds-builder \
                --driver docker-container || true
          - description: Build the Snapback controller-manager image
            cmd: |
              docker buildx build src/ \
                --builder=uds-builder \
                --platform=linux/amd64,linux/arm64 \
                --tag=zarf.internal/snapback-operator:latest \
                --output=type=oci,dest=images.tar
    # peat-node is pulled from upstream and baked into the package (airgap).
    images:
      - ghcr.io/defenseunicorns/peat-node:v0.3.1
    # The locally-built controller-manager image (OCI archive from buildx above).
    imageArchives:
      - path: images.tar
        images:
          - zarf.internal/snapback-operator:latest
