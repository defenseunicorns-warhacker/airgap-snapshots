# Bundle-level config overrides (required by uds-common tasks; may be empty).
#
# Peer wiring for the two same-cluster copies (keyed by bundle package name).
# These set the snapback package's Zarf variables (PEER_ID / PEER_ADDR), which
# flow into the app chart's peat.peer.{id,addr} via values/common-values.yaml.
#
#   peer_addr — the OTHER copy's iroh ClusterIP Service DNS (host:udp-port).
#   peer_id   — the OTHER copy's endpoint id, derived OFFLINE before deploy. It's
#               deterministic from the shared key + the peer's node id, which the
#               chart pins to "snapback-<role>". With the dev key above:
#                 peat-node derive-id \
#                   --shared-key AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
#                   --node-id snapback-destination   # -> snapback.peer_id
#                 peat-node derive-id \
#                   --shared-key AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
#                   --node-id snapback-source        # -> snapback-destination.peer_id
#
# Until peer_id is filled, the chart leaves PEAT_NODE_PEERS unset (no static
# peering) — fill both ids, then redeploy to enable cross-copy delivery.
variables:
  snapback: # source copy (namespace: snapback) -> dials destination
    peer_id: "0a2fab29c6e443edd079ea939348a5f66b1d84403cbef92d5401cf5fd5a8879f" # derive-id --node-id snapback-destination
    peer_addr: "snapback-destination-iroh.snapback-dest.svc.cluster.local:51820"
  snapback-destination: # destination copy (namespace: snapback-dest) -> dials source
    peer_id: "0b237433b931cd321711e81052a4d09cd93b8ee84d2ec5e4a8c78e82bced634d" # derive-id --node-id snapback-source
    peer_addr: "snapback-source-iroh.snapback.svc.cluster.local:51820"
