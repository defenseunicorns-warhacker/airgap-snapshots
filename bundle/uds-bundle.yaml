kind: UDSBundle
metadata:
  name: snapback-test
  description: >-
    Single-cluster dev bundle: deploys BOTH the source and destination roles of
    Snapback into separate namespaces (snapback-source / snapback-destination) so
    the full replication loop runs end to end on one cluster. The two peat-node
    sidecars peer over the in-cluster iroh ClusterIP Service DNS (no hostPort /
    Gateway needed — that's only for cross-HOST peering).
  version: dev

packages:
  # Velero (+ MinIO BSL) so Snapback has a real BSL to read. The BSL config matches
  # what the operator + objstore were validated against (uds-dev-stack MinIO).
  # Deployed once and shared by the source role.
  - name: core-backup-restore
    repository: ghcr.io/defenseunicorns/packages/uds/core-backup-restore
    ref: 1.6.0-registry1
    overrides:
      velero:
        velero:
          values:
            - path: extraObjects
              value:
                - apiVersion: uds.dev/v1alpha1
                  kind: Exemption
                  metadata:
                    name: snapback-velero-exemptions
                    namespace: uds-policy-exemptions
                  spec:
                    exemptions:
                      - policies:
                          - RequireNonRootUser
                          - RestrictVolumeTypes
                          - RestrictHostPathWrite
                        matcher:
                          namespace: velero
                          name: "^node-agent.*"
                          kind: pod
                        title: "Velero node agent (restic/kopia) hostPath access"
                        description:
                          "Velero's deployNodeAgent DaemonSet mounts host pod directories
                          (/var/lib/kubelet/pods) via hostPath to perform filesystem-level backup and
                          restore of pod volumes. The hostPath is mounted readOnly during backup. The
                          upstream velero/node-agent image runs as root (UID 0) and cannot satisfy
                          RequireNonRootUser without breaking snapshot functionality."
            - path: deployNodeAgent
              value: true
            - path: "configuration.backupStorageLocation"
              value:
                - name: default
                  provider: aws
                  bucket: "uds"
                  prefix: "backups"
                  config:
                    region: "uds-dev-stack"
                    s3ForcePathStyle: true
                    s3Url: "http://minio.uds-dev-stack.svc.cluster.local:9000"
                  credential:
                    name: "velero-bucket-credentials"
                    key: "cloud"
            # To exercise the bulk Kopia path later, enable the node-agent here:
            # - path: "deployNodeAgent"
            #   value: true

  # Source (send-side) copy — deployed into its own "snapback-source" namespace via
  # the package-level namespace override (applies to both charts in the package).
  - name: snapback
    path: ../
    ref: dev
    # [Alpha] Override the namespace for the whole package. Lets the same package
    # deploy twice in one cluster (source + destination) without colliding.
    namespace: snapback-source
    overrides:
      snapback:
        snapback:
          values:
            - path: role
              value: source
            # Always pull the just-in-time built dev image.
            - path: image.pullPolicy
              value: Always
            # DEV-ONLY throwaway Iroh shared key (32 zero bytes, base64). The SAME
            # value MUST be on both roles — it (plus the node id) deterministically
            # derives each side's iroh endpoint id (see peat.peer.id below).
            - path: peat.sharedKey
              value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
            # Static peer = the destination, reachable in-cluster at its iroh
            # ClusterIP Service DNS. peer.id is the destination's endpoint id,
            # derived offline: peat-node derive-id --shared-key <key> \
            #   --node-id snapback-destination
            - path: peat.peer.id
              value: "0a2fab29c6e443edd079ea939348a5f66b1d84403cbef92d5401cf5fd5a8879f"
            - path: peat.peer.addr
              value: "snapback-destination-iroh.snapback-destination.svc.cluster.local:51820"
            # Ship the ReplicationPolicy with the source package so the demo loop
            # runs end to end from one deploy. target.* is intentionally left unset:
            # it inherits the static peer (peat.peer.{id,addr} above), so the policy
            # and the sidecar peer share one source of truth. The selector scopes
            # replication to the backups the backup-io-simulator Schedule produces
            # (label app=backup-io-simulator, BSL "default").
            - path: replicationPolicy.create
              value: true
            - path: replicationPolicy.backupSelector
              value:
                app: backup-io-simulator
        uds-snapback-config:
          values:
            - path: role
              value: source

  # Destination (receive-side) copy — deployed into "snapback-destination".
  - name: snapback-destination
    path: ../zarf-package-snapback-destination.tar.zst
    ref: dev
    namespace: snapback-destination
    overrides:
      snapback:
        snapback:
          values:
            - path: role
              value: destination
            - path: image.pullPolicy
              value: Always
            - path: peat.sharedKey
              value: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
            # Static peer = the source, reachable in-cluster at its iroh ClusterIP
            # Service DNS. peer.id is the source's endpoint id, derived offline:
            #   peat-node derive-id --shared-key <key> --node-id snapback-source
            - path: peat.peer.id
              value: "0b237433b931cd321711e81052a4d09cd93b8ee84d2ec5e4a8c78e82bced634d"
            - path: peat.peer.addr
              value: "snapback-source-iroh.snapback-source.svc.cluster.local:51820"
        uds-snapback-config:
          values:
            - path: role
              value: destination
