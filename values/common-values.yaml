# Values for the snapback app chart, common to all flavors.
# role is driven by the package's ROLE Zarf variable (default "source"); Zarf
# substitutes it into this file at deploy time so a single knob flips both charts.
role: "###ZARF_VAR_ROLE###"

# NOTE: peat.sharedKey is intentionally NOT set here — production deployments must
# supply it (and a matching one on the destination) via a bundle override or
# peat.existingSharedKeySecret. The dev test bundle sets a throwaway key.
