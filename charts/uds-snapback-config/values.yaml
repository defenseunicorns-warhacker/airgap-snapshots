# role MUST match the snapback app chart's role (both are driven by ZARF_VAR_ROLE
# in the package values files). source | destination.
role: source

peat:
  # Pinned Iroh UDP port; must match the app chart's peat.irohUdpPort.
  irohUdpPort: 51820

manager:
  metricsPort: 8080

# Source egress to the Velero BSL object store (MinIO/S3). Precedence:
# remoteCidr > remoteNamespace > Anywhere.
objectStore:
  remoteNamespace: uds-dev-stack
  remoteCidr: ""
  port: 9000

# peat peer reachability over Iroh QUIC (UDP). The peer is typically in another
# cluster, so the default is Anywhere; set remoteCidr to tighten to the peer's
# egress/ingress IP range.
peer:
  remoteCidr: ""

# Emit a UDS monitor (ServiceMonitor) for the controller-manager metrics (source).
monitor:
  enabled: true

# Escape hatch for additional network.allow entries.
# https://docs.defenseunicorns.com/core/how-to-guides/networking/define-network-access/
additionalNetworkAllow: []
