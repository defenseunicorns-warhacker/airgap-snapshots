apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapback
  namespace: {{.Release.Namespace}}
  labels:
    app: snapback
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapback
  template:
    metadata:
      labels:
        app: snapback
    spec:
      containers:
        - name: snapback
          image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
          imagePullPolicy: {{.Values.image.pullPolicy}}
