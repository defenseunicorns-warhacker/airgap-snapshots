{{- if and (eq .Values.role "source") .Values.replicationPolicy.create }}
{{- $rp := .Values.replicationPolicy }}
{{- /*
The destination identity has a single source of truth: the PEER_ID/PEER_ADDR Zarf
vars (peat.peer.{id,addr}) that also wire the peat-node static peer. Inherit them
here so the packaged policy and the sidecar peer can't drift and the whole thing is
configurable at deploy time from PEER_ID/PEER_ADDR alone. An explicit
replicationPolicy.target.{endpointID,addresses} still wins when set.
*/}}
{{- $endpointID := $rp.target.endpointID | default .Values.peat.peer.id }}
{{- $addresses := $rp.target.addresses }}
{{- if and (empty $addresses) .Values.peat.peer.addr }}
{{- $addresses = list .Values.peat.peer.addr }}
{{- end }}
{{- if not $endpointID }}
{{- fail "snapback: replicationPolicy.create=true requires a destination Iroh endpoint id — set replicationPolicy.target.endpointID or the PEER_ID Zarf var (peat.peer.id)" }}
{{- end }}
# Optional packaged ReplicationPolicy. The destination's Iroh endpoint id is
# deterministic (derive-id from the shared key + the peer's pinned node id), so it
# can be known before deploy — set replicationPolicy.create=true to ship the policy
# with the package, configured from the same PEER_ID/PEER_ADDR vars as the static
# peer. Cluster-scoped.
apiVersion: snapback.uds.dev/v1alpha1
kind: ReplicationPolicy
metadata:
  name: {{ $rp.name | default (printf "%s-policy" (include "snapback.name" .)) }}
  labels:
    {{- include "snapback.labels" . | nindent 4 }}
spec:
  paused: false
  backupStorageLocations:
    {{- toYaml $rp.backupStorageLocations | nindent 4 }}
  backupSelector:
    matchLabels:
      {{- toYaml $rp.backupSelector | nindent 6 }}
  target:
    endpointID: {{ $endpointID | quote }}
    {{- with $addresses }}
    addresses:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    relayURL: {{ $rp.target.relayURL | quote }}
    nodeID: {{ $rp.target.nodeID | quote }}
  priority: {{ $rp.priority }}
  bundleByteLimit: {{ $rp.bundleByteLimit | int64 }}
  bundleFileLimit: {{ $rp.bundleFileLimit | int }}
  maxConcurrentBundles: {{ $rp.maxConcurrentBundles | int }}
  {{- if $rp.staleAfter }}
  staleAfter: {{ $rp.staleAfter | quote }}
  {{- end }}
  peat:
    address: "localhost:{{ .Values.peat.grpcPort }}"
    outboxRoot: outbox
    outboxPath: /var/lib/peat/outbox
{{- end }}
