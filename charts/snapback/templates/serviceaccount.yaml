{{- include "snapback.validateRole" . -}}
# Both roles run a controller-manager (source replicates; destination imports),
# so each gets a (role-suffixed) ServiceAccount bound to its role's ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "snapback.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapback.labels" . | nindent 4 }}
