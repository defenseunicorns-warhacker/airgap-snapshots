{{- if .Values.peat.gateway.enabled }}
# Binds the iroh Gateway's UDP listener to the iroh ClusterIP Service so the
# LoadBalancer forwards inbound QUIC datagrams to the peat-node container. iroh's
# peer authentication is certificate-based (endpoint_id handshake), independent of
# source IP, so proxying through Envoy's UDP session layer is transparent.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: {{ include "snapback.fullname" . }}-iroh
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapback.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ include "snapback.fullname" . }}-iroh
    sectionName: iroh-quic
  rules:
  - backendRefs:
    - name: {{ include "snapback.fullname" . }}-iroh
      port: {{ .Values.peat.irohUdpPort }}
{{- end }}
