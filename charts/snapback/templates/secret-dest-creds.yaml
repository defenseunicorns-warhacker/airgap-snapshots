{{- if eq .Values.role "destination" }}
{{- $creds := .Values.destination.objectStore.credentials }}
{{- if and $creds.inline (not $creds.existingSecret) }}
# Destination object-store credentials (AWS shared-credentials / Velero "cloud"
# format). Mounted into the manager and parsed via --dest-credentials-file. The
# chart creates this only when inline creds are supplied and no existingSecret is
# set; production should point credentials.existingSecret at a managed Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "snapback.destCredsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapback.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $creds.secretKey }}: {{ $creds.inline | quote }}
{{- end }}
{{- end }}
