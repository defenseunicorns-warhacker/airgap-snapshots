{{- if not .Values.peat.existingSharedKeySecret }}
{{- if not .Values.peat.sharedKey }}
{{- fail "snapback: set peat.sharedKey (base64-encoded 32 bytes) or point peat.existingSharedKeySecret at an existing Secret with key \"shared-key\". Source and destination MUST share the same value." }}
{{- end }}
# Iroh shared key for peat peer authentication. The SAME value must be deployed to
# both the source and destination clusters (alongside a matching peat.appId).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "snapback.sharedKeySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snapback.labels" . | nindent 4 }}
type: Opaque
stringData:
  shared-key: {{ .Values.peat.sharedKey | quote }}
{{- end }}
