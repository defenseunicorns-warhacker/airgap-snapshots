# role selects which side of the replication this release deploys. The same
# package is deployed to each cluster with a different role:
#   source      -> controller-manager + peat-node sender sidecar (+ CRDs + RBAC).
#                  Sits next to Velero; reads the BSL and ships backups.
#   destination -> peat-node receiver only (cold landing zone, inbox PVC).
role: source

# Snapback controller-manager image (built from src/ and baked into the package).
image:
  repository: zarf.internal/snapback-operator
  tag: latest
  pullPolicy: IfNotPresent

manager:
  # Extra args appended to the manager. Leader election is intentionally off
  # (single replica) so no lease RBAC is needed.
  extraArgs: []
  metricsPort: 8080
  probePort: 8081
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# peat-node sidecar/receiver. This is DEPLOYMENT-time config for the peat process
# itself. The replication TARGET (destination endpointID/addresses/relay, priority,
# bundle limits) is operator-facing config and lives in the ReplicationPolicy CR.
peat:
  image:
    repository: ghcr.io/defenseunicorns/peat-node
    tag: v0.4.3
    pullPolicy: IfNotPresent
  # appId + sharedKey authenticate peers; they MUST match across source/destination.
  appId: snapback
  # Iroh shared key, base64 (32 bytes). Either set sharedKey here (the chart creates
  # the Secret) OR point existingSharedKeySecret at a Secret with key "shared-key".
  sharedKey: ""
  existingSharedKeySecret: ""
  irohUdpPort: 51820
  grpcPort: 50051
  # Cross-HOST peering exposure: bind the iroh UDP port directly on the node via a
  # pod hostPort. Required when source and destination live in DIFFERENT clusters
  # on k3d (UDS Core's setup): k3d's serverlb publishes host:<port> ->
  # server-node:<port>, but MetalLB (not klipper servicelb) binds NO node hostPort,
  # so without this the published UDP datagrams hit a dead port and are dropped. A
  # hostPort makes the CNI install a node:<port> -> pod DNAT, closing the path so
  # serverlb's publish reaches the iroh endpoint. UDS Core's RestrictHostPorts
  # policy blocks host ports, so the uds-snapback-config chart ships a matching Pepr
  # Exemption (keep peat.hostPort.enabled in lockstep across both charts). Off by
  # default; enable per-cluster for cross-host peering. Same-cluster peering needs
  # none of this — peers dial the iroh ClusterIP Service DNS directly.
  hostPort:
    enabled: false
  # Static cross-host peer (id@addr) for the local peat-node sidecar. Normally
  # supplied at deploy time via the PEER_ID/PEER_ADDR Zarf vars (see
  # values/common-values.yaml). When both are set the chart wires PEAT_NODE_PEERS
  # and disables mDNS. For role=source with replicationPolicy.create=true these
  # also seed the packaged policy's target (endpointID/addresses) so the policy
  # and the sidecar peer share one source of truth. Empty => no static peer.
  peer:
    id: ""
    addr: ""
  # Retain terminal-bundle handles long enough to outlast the worst-case DDIL
  # outage (7d). Sized against the outbox PVC.
  handleRetentionSecs: 604800
  logLevel: "peat_node=info,peat_node::attachments=debug"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Persistent volumes. "" storageClassName uses the cluster default (local-path on k3d-uds).
storageClassName: ""
# source: staged backup deltas awaiting destination pull (kept until COMPLETED).
outbox:
  size: 100Gi
# both roles: peat data-dir (stable Iroh endpoint id + blob store + Automerge).
peatData:
  size: 50Gi
# destination: cold DR store of replicated backup objects.
inbox:
  size: 500Gi

# destination role: how the co-located importer reconstructs replicated backups.
# Ignored when role=source. The importer reads the inbox PVC (peat-written),
# verifies each landed file against the CRDT manifest, and writes it to the
# destination object store laid out as a Velero BSL (velero-backup.json last).
destination:
  # Inbox PVC mount path (where the peat receiver writes pulled attachments).
  inboxPath: /var/lib/peat/inbox
  # How often the importer polls the manifest collection for new backups.
  manifestPollInterval: 30s
  # Destination object store (a Velero BSL bucket). Point a destination Velero
  # BSL at this same bucket+prefix and it auto-discovers the imported backups.
  objectStore:
    endpoint: "" # e.g. http://minio.uds-dev-stack.svc.cluster.local:9000
    region: ""
    bucket: "" # e.g. uds-dr
    # prefix is where the importer writes (objects land at <prefix>/backups/<name>/...).
    # The destination Velero BSL MUST be configured with this SAME prefix so its
    # backup-sync controller auto-discovers the imported backups. It is independent
    # of the source BSL prefix.
    prefix: backups
    s3ForcePathStyle: true
    insecureSkipTLSVerify: false
    # Credentials: an AWS shared-credentials Secret (Velero "cloud" format).
    # Either point existingSecret at a Secret in this namespace, or set inline
    # (dev) and the chart creates the Secret.
    credentials:
      existingSecret: "" # Secret name holding the creds (key below)
      secretKey: cloud # key within the Secret holding the credentials file
      profile: "" # profile within the credentials file ("" = default)
      inline: "" # dev-only inline creds; chart creates the Secret when set
  # Source peat peer for the reverse ConnectPeer (so the receiver can dial back
  # and pull). Empty endpointID => peering is bootstrapped out-of-band.
  sourcePeer:
    endpointID: ""
    addresses: []
    relayURL: ""

# Optionally have the chart create a ReplicationPolicy (source role only). Off by
# default. The destination's Iroh endpoint id is deterministic (derive-id from the
# shared key + the peer's pinned node id), so it can be known before deploy: set
# create=true to ship the policy with the package. When target.endpointID/addresses
# are left empty they inherit the static peer (peat.peer.{id,addr} <- PEER_ID/
# PEER_ADDR), so a single deploy-time knob configures both the policy and the
# sidecar peer with no drift. Set target.* explicitly only to override that.
replicationPolicy:
  create: false
  name: ""
  backupStorageLocations: ["default"]
  backupSelector: {}
  target:
    endpointID: "" # empty => inherits peat.peer.id (PEER_ID)
    addresses: [] # empty => inherits [peat.peer.addr] (PEER_ADDR)
    relayURL: ""
    nodeID: ""
  priority: Bulk
  bundleByteLimit: 1073741824
  bundleFileLimit: 64
  maxConcurrentBundles: 4
  staleAfter: ""
