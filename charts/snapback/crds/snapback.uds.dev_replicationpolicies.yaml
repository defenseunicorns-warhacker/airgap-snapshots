    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ReplicationPolicy declares cross-cluster Velero backup replication
          via peat.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReplicationPolicySpec defines what to replicate and where
              to.
            properties:
              backupSelector:
                description: BackupSelector selects which Velero Backups qualify (empty
                  = all).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              backupStorageLocationSelector:
                description: BackupStorageLocationSelector selects source BSLs by
                  label.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              backupStorageLocations:
                description: BackupStorageLocations selects source BSLs by name.
                items:
                  type: string
                type: array
              bundleByteLimit:
                default: 1073741824
                description: |-
                  BundleByteLimit caps the total bytes per SendAttachments bundle.
                  Must be <= peat --attachment-max-bundle-bytes (default 1 GiB).
                format: int64
                type: integer
              bundleFileLimit:
                default: 64
                description: |-
                  BundleFileLimit caps the file count per bundle.
                  Must be <= peat --attachment-max-files-per-bundle (default 64).
                format: int32
                type: integer
              maxConcurrentBundles:
                default: 4
                description: |-
                  MaxConcurrentBundles caps in-flight distributions.
                  Must be <= peat --attachment-max-concurrent-distributions (default 4).
                format: int32
                type: integer
              objectStore:
                description: ObjectStore optionally overrides BSL-derived object-store
                  access.
                properties:
                  caBundleSecretRef:
                    description: CABundleSecretRef points at a CA bundle for TLS verification.
                    properties:
                      key:
                        description: Key within the Secret's data.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the Velero
                          namespace when empty.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  credentialsSecretRef:
                    description: CredentialsSecretRef overrides the BSL-derived credentials.
                    properties:
                      key:
                        description: Key within the Secret's data.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                      namespace:
                        description: Namespace of the Secret. Defaults to the Velero
                          namespace when empty.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  endpoint:
                    description: Endpoint overrides the object-store endpoint (e.g.
                      https://minio.velero.svc:9000).
                    type: string
                  insecureSkipTLSVerify:
                    description: InsecureSkipTLSVerify disables TLS verification (discouraged).
                    type: boolean
                  region:
                    description: Region overrides the object-store region.
                    type: string
                type: object
              paused:
                description: Paused stops new replication work while true.
                type: boolean
              peat:
                description: Peat configures the local peat-node sidecar connection.
                properties:
                  address:
                    default: localhost:50051
                    description: Address of the local peat-node gRPC endpoint.
                    type: string
                  outboxPath:
                    default: /var/lib/peat/outbox
                    description: OutboxPath is the filesystem mount path of that root
                      inside this pod.
                    type: string
                  outboxRoot:
                    default: outbox
                    description: OutboxRoot is the peat --attachment-root name files
                      are staged under.
                    type: string
                type: object
              priority:
                default: Bulk
                description: Priority is the peat AttachmentPriority for these transfers.
                enum:
                - Bulk
                - Low
                - Routine
                - Priority
                - Critical
                type: string
              staleAfter:
                description: |-
                  StaleAfter is how long to wait on a non-terminal bundle before re-issuing
                  SendAttachments (idempotent via deterministic bundle_id). Tune to expected
                  DDIL outage windows.
                type: string
              target:
                description: Target is the destination peat peer.
                properties:
                  addresses:
                    description: |-
                      Addresses are direct UDP host:port addresses for the destination peat-node.
                      Pin the destination's --iroh-udp-port so these stay stable.
                    items:
                      type: string
                    type: array
                  endpointID:
                    description: |-
                      EndpointID is the destination's hex-encoded Iroh endpoint ID. Operative field:
                      used for ConnectPeer (peering). v1 distributes with AllNodes scope, so the
                      source must peer only with intended destinations.
                    type: string
                  nodeID:
                    description: |-
                      NodeID is the destination peat-node --node-id. Informational in v1 (scope is
                      AllNodes); relevant only for future NodeList targeting once peat's node
                      registry is populated.
                    type: string
                  relayURL:
                    description: RelayURL is an optional Iroh relay URL for NAT traversal.
                    type: string
                required:
                - endpointID
                type: object
            required:
            - target
            type: object
          status:
            description: ReplicationPolicyStatus is the observed state of a ReplicationPolicy.
            properties:
              backupsReplicated:
                description: BackupsReplicated is the cumulative count of backups
