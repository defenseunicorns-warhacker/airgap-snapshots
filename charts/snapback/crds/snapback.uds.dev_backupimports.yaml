metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: backupimports.snapback.uds.dev
spec:
  group: snapback.uds.dev
  names:
    kind: BackupImport
    listKind: BackupImportList
    plural: backupimports
    shortNames:
    - bimp
    singular: backupimport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backupName
      name: Backup
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.filesImported
      name: Imported
      type: integer
    - jsonPath: .status.committed
      name: Committed
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackupImport is the destination-side unit of work and audit for reconstructing
          one replicated backup into the destination object store.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BackupImportSpec is the desired import of one replicated backup on the
              destination. Created by the manifest poll-bridge from a snapback_replications
              document; the reconciler fetches the manifest itself so the CR stays small
              (no large file list in etcd).
            properties:
              backupName:
                description: BackupName is the Velero backup being reconstructed.
                type: string
              manifestDocID:
                description: |-
                  ManifestDocID is the peat document id of the replication manifest in the
                  snapback_replications collection.
                type: string
              storageLocation:
                description: StorageLocation is the source BackupStorageLocation the
                  backup came from.
                type: string
            required:
            - backupName
            - manifestDocID
            - storageLocation
            type: object
          status:
            description: BackupImportStatus is the observed import state.
            properties:
              bytesImported:
                description: BytesImported is the total bytes written to the destination
                  store.
                format: int64
                type: integer
              committed:
                description: |-
                  Committed is true once the discovery object (velero-backup.json) has been
                  written last, making the backup discoverable by destination Velero.
                type: boolean
              completedAt:
                description: CompletedAt is when the backup was fully imported and
                  committed.
                format: date-time
                type: string
              conditions:
                description: Conditions are detailed observations (Ready, Degraded).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              filesImported:
                description: FilesImported is the number verified + written to the
                  destination store.
                format: int64
                type: integer
              filesTotal:
                description: FilesTotal is the number of files the manifest declares.
                format: int64
                type: integer
              lastError:
                description: LastError is the most recent error message, if any.
                type: string
              observedGeneration:
                description: ObservedGeneration is the last spec generation reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level lifecycle phase.
                enum:
                - Pending
                - Importing
                - Imported
                - Failed
                type: string
              retryCount:
                description: RetryCount is the number of reconcile-driven retries.
                format: int32
                type: integer
              startedAt:
                description: StartedAt is when the first import pass began.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
