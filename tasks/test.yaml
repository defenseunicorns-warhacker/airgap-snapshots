# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/tasks.schema.json
tasks:
  - name: all
    actions:
      - task: health-check
      - task: deploy-backup-io-simulator
      - task: peat-connected
      - task: backup-replicated

  - name: health-check
    actions:
      - description: Snapback Source Health Check
        wait:
          cluster:
            kind: StatefulSet
            name: snapback
            namespace: snapback-source
      - description: Snapback Destination Health Check
        wait:
          cluster:
            kind: StatefulSet
            name: snapback
            namespace: snapback-destination

  - name: deploy-backup-io-simulator
    description: Build and deploy the backup I/O simulator, then wait for it to start writing
    actions:
      - description: Create backup-io-simulator package
        dir: tests/backup-io-simulator
        cmd: uds zarf package create --confirm --skip-sbom
      - description: Deploy backup-io-simulator package
        dir: tests/backup-io-simulator
        cmd: uds zarf package deploy --confirm zarf-package-backup-io-simulator-*.tar.zst
      - description: Wait for backup-io-simulator pod to be ready
        wait:
          cluster:
            kind: Pod
            name: backup-io-simulator
            namespace: backup-io-simulator
            condition: Ready
      - description: Verify backup-io-simulator PVC is receiving data
        maxRetries: 12
        cmd: |
          BEFORE=$(uds zarf tools kubectl exec pod/backup-io-simulator \
            -n backup-io-simulator -c log-append-simulator \
            -- sh -c 'du -sb /data 2>/dev/null | awk "{print \$1}"')
          sleep 15
          AFTER=$(uds zarf tools kubectl exec pod/backup-io-simulator \
            -n backup-io-simulator -c log-append-simulator \
            -- sh -c 'du -sb /data 2>/dev/null | awk "{print \$1}"')
          echo "PVC bytes: before=${BEFORE} after=${AFTER}"
          [ "${AFTER}" -gt "${BEFORE}" ]

  - name: peat-connected
    description: Verify the source peat-node has an established connection to the destination peer
    actions:
      - description: Source peat-node connected to destination peer
        maxRetries: 12
        cmd: |
          uds zarf tools kubectl logs snapback-0 -n snapback-source -c peat-node \
            | grep -q "connected to peer" || { sleep 10; exit 1; }

  - name: backup-replicated
    description: Verify at least one backup-io-simulator attachment has landed in the destination inbox
    actions:
      - description: backup-io-simulator backup received in destination inbox
        maxRetries: 24
        cmd: |
          uds zarf tools kubectl logs snapback-0 -n snapback-destination -c peat-node \
            | grep -q "attachment written to inbox.*backup-io-simulator" || { sleep 10; exit 1; }
