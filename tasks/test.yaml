# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/tasks.schema.json
tasks:
  - name: all
    actions:
      - task: health-check
      - task: operator-check
      - task: create-backup-io-simulator-package
      - task: backup-io-simulator

  # Ensure application deploys successfully and becomes available
  - name: health-check
    actions:
      - description: Snapback Health Check
        wait:
          cluster:
            kind: Deployment
            name: snapback
            namespace: snapback
            condition: Available

  - name: operator-check
    actions:
      - description: "Snapback Operator Check"
        maxRetries: 30
        cmd: |
          # currently the container just prints the current time every 10 seconds
          # we can check that the operator is running by verifying it logs a timestamp
          OUTPUT=$(uds zarf tools kubectl logs deployment/snapback -n snapback --tail=1)
          echo "Operator output: ${OUTPUT}"
          # validate the output is a "YYYY-MM-DD HH:MM:SS" timestamp
          if ! echo "${OUTPUT}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}$'; then
            echo "Output did not match the expected timestamp format"
            sleep 10
            exit 1
          fi

  - name: create-backup-io-simulator-package
    description: Build the backup I/O simulator test package archive
    actions:
      - description: Create backup-io-simulator package archive
        dir: tests/backup-io-simulator
        cmd: |
          uds zarf package create --confirm --skip-sbom
      - description: Deploy backup-io-simulator package archive
        dir: tests/backup-io-simulator
        cmd: |
          uds zarf package deploy --confirm zarf-package-backup-io-simulator-*.tar.zst

  - name: backup-io-simulator
    actions:
      - description: "Deploy backup I/O simulator workload"
        maxRetries: 30
        cmd: |
          NS=$(uds zarf tools kubectl get pod --all-namespaces \
            -o jsonpath='{range .items[?(@.metadata.name=="backup-io-simulator")]}{.metadata.namespace}{"\n"}{end}' \
            | head -n1)

          if [ -z "${NS}" ]; then
            echo "backup-io-simulator pod not found yet"
            sleep 10
            exit 1
          fi

          uds zarf tools kubectl wait --for=condition=Ready pod/backup-io-simulator \
            -n "${NS}" --timeout=120s
      - description: "Verify backup I/O simulator PVC is receiving data"
        maxRetries: 12
        cmd: |
          WAIT_SECONDS=15

          NS=$(uds zarf tools kubectl get pod --all-namespaces \
            -o jsonpath='{range .items[?(@.metadata.name=="backup-io-simulator")]}{.metadata.namespace}{"\n"}{end}' \
            | head -n1)

          if [ -z "${NS}" ]; then
            echo "backup-io-simulator pod not found"
            exit 1
          fi

          if ! uds zarf tools kubectl get pvc test-io-pvc -n "${NS}" >/dev/null 2>&1; then
            echo "PVC test-io-pvc not found in namespace ${NS}"
            exit 1
          fi

          BEFORE=$(uds zarf tools kubectl exec pod/backup-io-simulator -n "${NS}" \
            -c log-append-simulator -- sh -c 'du -sb /data 2>/dev/null | awk "{print \$1}"')

          sleep "${WAIT_SECONDS}"

          AFTER=$(uds zarf tools kubectl exec pod/backup-io-simulator -n "${NS}" \
            -c log-append-simulator -- sh -c 'du -sb /data 2>/dev/null | awk "{print \$1}"')

          echo "PVC bytes in ${NS}: before=${BEFORE} after=${AFTER}"

          if [ -z "${BEFORE}" ] || [ -z "${AFTER}" ]; then
            echo "Unable to read PVC usage from /data"
            exit 1
          fi

          if [ "${AFTER}" -le "${BEFORE}" ]; then
            echo "PVC usage did not grow; expected active writes"
            exit 1
          fi
