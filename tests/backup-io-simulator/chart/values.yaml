# backup IO simulator image
image:
  repository: alpine
  tag: latest
  pullPolicy: IfNotPresent

# PersistentVolumeClaim (PVC) configuration
pvc:
  name: test-io-pvc
  accessModes:
    - ReadWriteOnce
  storage: 10Gi

# Pod configuration
pod:
  name: backup-io-simulator

# Configurable parameters for generating realistic I/O patterns
simulator:
  logRotateAfter: 10000
  batchIntervalSeconds: 5
  dbCheckpointEvery: 200
  dbIopsSleepMicros: 10000

# Velero BackupSchedule configuration
veleroBackupSchedule:
  name: backup-io-simulator-schedule
  namespace: velero
  schedule: "*/5 * * * *"
  includedNamespaces:
    - default
  includedResources:
    - persistentvolumeclaims
    - persistentvolumes
  snapshotVolumes: true
  defaultVolumesToFsBackup: false
  ttl: 0h10m
  labels:
    app: backup-io-simulator